<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1b2d;
      --navy-mid: #162236;
      --navy-light: #1e3050;
      --navy-border: #2a4166;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: rgba(59,130,246,0.12);
      --gold: #f59e0b;
      --green: #10b981;
      --green-light: rgba(16,185,129,0.12);
      --red: #ef4444;
      --red-light: rgba(239,68,68,0.10);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --surface: #162236;
      --surface-2: #1e3050;
      --border: #2a4166;
      --radius: 8px;
      --radius-lg: 12px;
      --mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--text-primary); min-height: 100vh; display: flex; }
    #root { display: flex; width: 100%; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 220px; min-height: 100vh; background: var(--navy-mid); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .logo-mark { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
    .sidebar-logo .logo-mark svg { width: 18px; height: 18px; fill: white; }
    .sidebar-logo h1 { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .sidebar-logo p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .nav-section { margin-bottom: 20px; }
    .nav-section-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; padding: 0 8px; margin-bottom: 4px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: all .15s; }
    .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
    .setup-badge { font-size: 11px; background: rgba(245,158,11,.12); color: var(--gold); border: 1px solid rgba(245,158,11,.25); border-radius: 6px; padding: 6px 10px; cursor: pointer; text-align: center; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--navy-mid); }
    .topbar h2 { font-size: 16px; font-weight: 600; }
    .topbar p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .content { flex: 1; padding: 24px; overflow-y: auto; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
    .card + .card { margin-top: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .stat-value { font-family: var(--mono); font-size: 24px; font-weight: 500; color: var(--text-primary); }
    .stat-value.green { color: var(--green); }
    .stat-value.gold { color: var(--gold); }
    .stat-value.red { color: var(--red); }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    td { padding: 12px; border-bottom: 1px solid rgba(42,65,102,.5); color: var(--text-secondary); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); color: var(--text-primary); }
    .mono { font-family: var(--mono); font-size: 12px; }
    td.name { color: var(--text-primary); font-weight: 500; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
    .badge-green { background: var(--green-light); color: var(--green); }
    .badge-red { background: var(--red-light); color: var(--red); }
    .badge-gold { background: rgba(245,158,11,.12); color: var(--gold); }
    .badge-blue { background: var(--accent-light); color: var(--accent); }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 9px 12px; font-size: 13px; color: var(--text-primary); font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .form-group select option { background: var(--navy); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; font-family: inherit; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text-primary); border-color: var(--accent); }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    /* NLP Panel */
    .nlp-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; height: 480px; }
    .nlp-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
    .msg-avatar.user { background: var(--accent-light); color: var(--accent); }
    .msg-avatar.ai { background: rgba(16,185,129,.15); color: var(--green); }
    .msg-bubble { background: var(--surface-2); border-radius: 8px; padding: 10px 14px; font-size: 13px; line-height: 1.6; color: var(--text-primary); max-width: 600px; }
    .msg-bubble.user { background: var(--accent-light); border: 1px solid rgba(59,130,246,.2); }
    .msg-bubble pre { font-family: var(--mono); font-size: 12px; white-space: pre-wrap; margin-top: 8px; background: rgba(0,0,0,.2); padding: 10px; border-radius: 6px; }
    .nlp-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .nlp-input { flex: 1; background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--text-primary); font-family: inherit; resize: none; height: 42px; }
    .nlp-input:focus { outline: none; border-color: var(--accent); }
    .nlp-suggestions { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .nlp-chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; background: none; font-family: inherit; transition: all .15s; }
    .nlp-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Setup page */
    .setup-step { display: flex; gap: 14px; padding: 16px; border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 12px; align-items: flex-start; }
    .setup-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .setup-num.done { background: var(--green-light); color: var(--green); }
    .setup-text h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .setup-text p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .setup-text code { font-family: var(--mono); font-size: 11px; background: rgba(0,0,0,.3); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
    .input-block { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-top: 8px; font-size: 12px; font-family: var(--mono); color: var(--text-secondary); word-break: break-all; }
    .config-status { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-top: 8px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }
    .dot-gold { background: var(--gold); }

    /* Loading */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.2); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: .4; }
    .empty p { font-size: 13px; margin-top: 6px; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; background: var(--navy); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; width: fit-content; }
    .tab { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all .15s; border: none; background: none; font-family: inherit; }
    .tab.active { background: var(--surface); color: var(--text-primary); }

    /* Utility */
    .section-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .section-row h3 { font-size: 15px; font-weight: 600; }
    .gap-12 { display: flex; flex-direction: column; gap: 12px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } .sidebar { width: 56px; } .sidebar .sidebar-logo h1, .sidebar .nav-item span, .nav-section-label, .sidebar-logo p, .sidebar-footer { display: none; } .nav-item { justify-content: center; padding: 10px; } }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
// Paste your values here after following the Setup page instructions
const CONFIG_KEY = 'pm_config';
const getConfig = () => {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch { return {}; }
};
const saveConfig = (cfg) => localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));

// ── GOOGLE SHEETS API ─────────────────────────────────────────────────────────
const SHEETS = {
  PROPERTIES: 'Properties',
  TENANTS: 'Tenants',
  RENT: 'Rent',
  MAINTENANCE: 'Maintenance',
  UTILITIES: 'Utilities',
};

async function sheetsRequest(method, path, body = null) {
  const cfg = getConfig();
  if (!cfg.accessToken) throw new Error('Not authenticated');
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.spreadsheetId}${path}`;
  const res = await fetch(url, {
    method,
    headers: { Authorization: `Bearer ${cfg.accessToken}`, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401) { saveConfig({ ...cfg, accessToken: null }); throw new Error('Session expired — please sign in again'); }
    throw new Error(err.error?.message || 'Sheets API error');
  }
  return res.json();
}

async function readSheet(sheetName) {
  const data = await sheetsRequest('GET', `/values/${sheetName}`);
  const rows = data.values || [];
  if (rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map((row, i) => {
    const obj = { _row: i + 2 };
    headers.forEach((h, j) => { obj[h] = row[j] || ''; });
    return obj;
  });
}

async function appendRow(sheetName, values) {
  await sheetsRequest('POST', `/values/${sheetName}!A1:append?valueInputOption=USER_ENTERED`, {
    values: [values],
  });
}

async function updateRow(sheetName, rowNum, values, numCols) {
  const col = String.fromCharCode(64 + numCols);
  await sheetsRequest('PUT', `/values/${sheetName}!A${rowNum}:${col}${rowNum}?valueInputOption=USER_ENTERED`, {
    values: [values],
  });
}

// Initialize sheet headers if sheets are empty
async function initSheets() {
  const headers = {
    Properties: ['ID', 'Name', 'Address', 'Type', 'Rent Amount', 'Notes', 'Created'],
    Tenants: ['ID', 'Property ID', 'Name', 'Phone', 'Email', 'Advance', 'Move In Date', 'Status', 'Notes'],
    Rent: ['ID', 'Property ID', 'Tenant ID', 'Month', 'Year', 'Amount', 'Paid Date', 'Status', 'Notes'],
    Maintenance: ['ID', 'Property ID', 'Date', 'Description', 'Amount', 'Vendor', 'Category'],
    Utilities: ['Property ID', 'Electricity Number', 'Property Tax Number', 'Water Bill Number', 'Notes'],
  };
  for (const [sheet, h] of Object.entries(headers)) {
    try {
      const data = await sheetsRequest('GET', `/values/${sheet}!A1:Z1`);
      if (!data.values || data.values.length === 0) {
        await sheetsRequest('PUT', `/values/${sheet}!A1:${String.fromCharCode(64+h.length)}1?valueInputOption=USER_ENTERED`, { values: [h] });
      }
    } catch {}
  }
}

// ── GOOGLE AUTH ───────────────────────────────────────────────────────────────
function signInWithGoogle() {
  const cfg = getConfig();
  const params = new URLSearchParams({
    client_id: cfg.clientId,
    redirect_uri: window.location.origin + window.location.pathname,
    response_type: 'token',
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    prompt: 'consent',
  });
  window.location.href = `https://accounts.google.com/o/oauth2/auth?${params}`;
}

function parseTokenFromHash() {
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const token = hash.get('access_token');
  if (token) {
    const cfg = getConfig();
    saveConfig({ ...cfg, accessToken: token });
    window.history.replaceState({}, '', window.location.pathname);
    return token;
  }
  return null;
}

// ── GEMINI NLP ────────────────────────────────────────────────────────────────
async function askClaude(question, allData) {
  const cfg = getConfig();
  if (!cfg.geminiKey) return 'Gemini API key not set. Add it in Setup → Step 3.';

  const context = `You are a property management assistant. Answer questions about this data concisely and helpfully.

PROPERTIES: ${JSON.stringify(allData.properties)}
TENANTS: ${JSON.stringify(allData.tenants)}
RENT RECORDS: ${JSON.stringify(allData.rent)}
MAINTENANCE: ${JSON.stringify(allData.maintenance)}
UTILITIES: ${JSON.stringify(allData.utilities)}

Answer the user's question. For amounts, use ₹ symbol. Be specific with numbers and names. If listing items, use a short formatted list. Today's date context: ${new Date().toLocaleDateString('en-IN')}.`;

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${cfg.geminiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: context }] },
      contents: [{ role: 'user', parts: [{ text: question }] }],
      generationConfig: { maxOutputTokens: 1000 }
    }),
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || 'Gemini API error'); }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response from Gemini.';
}

// ── ICONS ─────────────────────────────────────────────────────────────────────
const Icon = ({ name, size = 16 }) => {
  const icons = {
    home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    users: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
    currency: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
    tool: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>,
    zap: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    chat: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
    settings: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
    plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    send: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
    check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="20 6 9 17 4 12"/></svg>,
    external: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
    dashboard: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
  };
  return icons[name] || null;
};

// ── PAGES ─────────────────────────────────────────────────────────────────────

// Dashboard
function Dashboard({ data, loading }) {
  const now = new Date();
  const currentMonth = now.toLocaleString('en-IN', { month: 'long' });
  const currentYear = now.getFullYear();

  const totalProperties = data.properties.length;
  const activeTenantsCount = data.tenants.filter(t => t.Status === 'Active').length;

  const thisMonthRent = data.rent.filter(r => r.Month === currentMonth && String(r.Year) === String(currentYear));
  const collectedAmount = thisMonthRent.filter(r => r.Status === 'Paid').reduce((s, r) => s + Number(r.Amount || 0), 0);
  const pendingCount = totalProperties - thisMonthRent.filter(r => r.Status === 'Paid').length;

  const maintenanceTotal = data.maintenance.reduce((s, m) => s + Number(m.Amount || 0), 0);

  return (
    <div>
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Properties</div>
          <div className="stat-value">{totalProperties}</div>
          <div className="stat-sub">Total registered</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Active Tenants</div>
          <div className="stat-value green">{activeTenantsCount}</div>
          <div className="stat-sub">Currently occupied</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Rent Collected — {currentMonth}</div>
          <div className="stat-value green">₹{collectedAmount.toLocaleString('en-IN')}</div>
          <div className="stat-sub">{thisMonthRent.filter(r=>r.Status==='Paid').length} of {totalProperties} properties</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Pending Rent</div>
          <div className="stat-value" style={{color: pendingCount > 0 ? 'var(--red)' : 'var(--green)'}}>{pendingCount}</div>
          <div className="stat-sub">Properties not paid</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Maintenance Spent</div>
          <div className="stat-value gold">₹{maintenanceTotal.toLocaleString('en-IN')}</div>
          <div className="stat-sub">All time</div>
        </div>
      </div>

      <div className="two-col">
        <div className="card">
          <div className="card-title">Properties Overview</div>
          {loading ? <div style={{color:'var(--text-muted)',fontSize:13}}>Loading...</div> :
          data.properties.length === 0 ? <div className="empty"><p>No properties yet. Add your first property.</p></div> :
          <div className="table-wrap">
            <table>
              <thead><tr><th>Property</th><th>Tenant</th><th>Rent</th><th>Status</th></tr></thead>
              <tbody>
                {data.properties.map(p => {
                  const tenant = data.tenants.find(t => t['Property ID'] === p.ID && t.Status === 'Active');
                  const paid = data.rent.find(r => r['Property ID'] === p.ID && r.Month === currentMonth && String(r.Year) === String(currentYear) && r.Status === 'Paid');
                  return (
                    <tr key={p.ID}>
                      <td className="name">{p.Name}</td>
                      <td>{tenant ? tenant.Name : <span style={{color:'var(--text-muted)'}}>Vacant</span>}</td>
                      <td className="mono">₹{Number(p['Rent Amount']||0).toLocaleString('en-IN')}</td>
                      <td><span className={`badge ${paid ? 'badge-green' : 'badge-red'}`}>{paid ? 'Paid' : 'Pending'}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>}
        </div>

        <div className="card">
          <div className="card-title">Recent Maintenance</div>
          {data.maintenance.length === 0 ? <div className="empty"><p>No maintenance records yet.</p></div> :
          <div className="table-wrap">
            <table>
              <thead><tr><th>Property</th><th>Description</th><th>Amount</th></tr></thead>
              <tbody>
                {data.maintenance.slice(-6).reverse().map((m, i) => {
                  const prop = data.properties.find(p => p.ID === m['Property ID']);
                  return (
                    <tr key={i}>
                      <td>{prop ? prop.Name : m['Property ID']}</td>
                      <td>{m.Description}</td>
                      <td className="mono">₹{Number(m.Amount||0).toLocaleString('en-IN')}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>}
        </div>
      </div>
    </div>
  );
}

  const handleSave = async () => {
    if (!form['Property ID'] || !form.Name || !form.Phone) { alert('Property, name and phone are required.'); return; }
    setSaving(true);
    try {
      // Mark previous tenant for this property as Vacated
      const prev = data.tenants.filter(t => t['Property ID'] === form['Property ID'] && t.Status === 'Active');
      for (const t of prev) {
        await updateRow('Tenants', t._row, [t.ID, t['Property ID'], t.Name, t.Phone, t.Email, t.Advance, t['Move In Date'], 'Vacated', t.Notes], 9);
      }
      await appendRow('Tenants', [`T${Date.now()}`, form['Property ID'], form.Name, form.Phone, form.Email, form.Advance, form['Move In Date'], 'Active', form.Notes]);
      setShowForm(false);
      setForm({ 'Property ID': '', Name: '', Phone: '', Email: '', Advance: '', 'Move In Date': '', Notes: '' });
      onRefresh();
    } catch (e) { alert('Error: ' + e.message); }
    setSaving(false);

  const filtered = data.tenants.filter(t => tab === 'active' ? t.Status === 'Active' : t.Status !== 'Active');

  return (
    <div>

                {data.properties.map(p => <option key={p.ID} value={p.ID}>{p.Name}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Tenant Name *</label><input placeholder="Full name" value={form.Name} onChange={e => setForm({...form, Name: e.target.value})}/></div>
            <div className="form-group"><label>Phone *</label><input placeholder="9876543210" value={form.Phone} onChange={e => setForm({...form, Phone: e.target.value})}/></div>
            <div className="form-group"><label>Email</label><input placeholder="email@example.com" value={form.Email} onChange={e => setForm({...form, Email: e.target.value})}/></div>

function Rent({ data, onRefresh }) {
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [filterMonth, setFilterMonth] = useState(new Date().toLocaleString('en-IN', { month: 'long' }));
  const [filterYear, setFilterYear] = useState(String(new Date().getFullYear()));
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const years = ['2023','2024','2025','2026','2027'];
  const [form, setForm] = useState({ 'Property ID': '', Month: new Date().toLocaleString('en-IN',{month:'long'}), Year: String(new Date().getFullYear()), Amount: '', 'Paid Date': new Date().toISOString().split('T')[0], Status: 'Paid', Notes: '' });

  const handleSave = async () => {
    if (!form['Property ID'] || !form.Amount) { alert('Property and amount are required.'); return; }
    setSaving(true);
    try {
      const tenant = data.tenants.find(t => t['Property ID'] === form['Property ID'] && t.Status === 'Active');
      await appendRow('Rent', [`R${Date.now()}`, form['Property ID'], tenant?.ID || '', form.Month, form.Year, form.Amount, form['Paid Date'], form.Status, form.Notes]);
      setShowForm(false);
      onRefresh();
    } catch (e) { alert('Error: ' + e.message); }
    setSaving(false);
  };

  const filtered = data.rent.filter(r => r.Month === filterMonth && String(r.Year) === filterYear);
  const total = filtered.filter(r => r.Status === 'Paid').reduce((s, r) => s + Number(r.Amount || 0), 0);
  const paidPropIds = filtered.filter(r => r.Status === 'Paid').map(r => r['Property ID']);
  const notPaid = data.properties.filter(p => !paidPropIds.includes(p.ID));

  return (
    <div>
      <div className="section-row">
        <h3>Rent</h3>
        <button className="btn btn-primary" onClick={() => setShowForm(!showForm)}><Icon name="plus" size={14}/> Record Rent</button>

      {showForm && (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-title">Record Rent Payment</div>
          <div className="form-grid">
            <div className="form-group"><label>Property *</label>
              <select value={form['Property ID']} onChange={e => {
                const prop = data.properties.find(p => p.ID === e.target.value);
                setForm({...form, 'Property ID': e.target.value, Amount: prop?.['Rent Amount'] || form.Amount });
              }}>
                <option value="">Select property</option>
                {data.properties.map(p => <option key={p.ID} value={p.ID}>{p.Name}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Month</label>
              <select value={form.Month} onChange={e => setForm({...form, Month: e.target.value})}>
                {months.map(m => <option key={m}>{m}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Year</label>
              <select value={form.Year} onChange={e => setForm({...form, Year: e.target.value})}>
                {years.map(y => <option key={y}>{y}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Amount (₹) *</label><input type="number" placeholder="15000" value={form.Amount} onChange={e => setForm({...form, Amount: e.target.value})}/></div>
            <div className="form-group"><label>Paid Date</label><input type="date" value={form['Paid Date']} onChange={e => setForm({...form, 'Paid Date': e.target.value})}/></div>
            <div className="form-group"><label>Status</label>
              <select value={form.Status} onChange={e => setForm({...form, Status: e.target.value})}>
                <option>Paid</option><option>Partial</option><option>Pending</option>
              </select>
            </div>
            <div className="form-group"><label>Notes</label><input placeholder="e.g. Paid by UPI" value={form.Notes} onChange={e => setForm({...form, Notes: e.target.value})}/></div>
          </div>
          <div className="btn-row">
            <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving ? <><span className="spinner"/>&nbsp;Saving...</> : 'Save'}</button>
            <button className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <select style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text-primary)',padding:'7px 12px',borderRadius:6,fontSize:13}} value={filterMonth} onChange={e => setFilterMonth(e.target.value)}>
          {months.map(m => <option key={m}>{m}</option>)}
        </select>
        <select style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text-primary)',padding:'7px 12px',borderRadius:6,fontSize:13}} value={filterYear} onChange={e => setFilterYear(e.target.value)}>
          {years.map(y => <option key={y}>{y}</option>)}
        </select>
        <div style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:14,color:'var(--green)'}}>
          Collected: ₹{total.toLocaleString('en-IN')}
        </div>
      </div>

      {notPaid.length > 0 && (
        <div style={{background:'var(--red-light)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13}}>
          <span style={{color:'var(--red)',fontWeight:500}}>Pending: </span>
          <span style={{color:'var(--text-secondary)'}}>{notPaid.map(p => p.Name).join(', ')}</span>
        </div>
      )}

      <div className="card">
        {filtered.length === 0 ? <div className="empty"><p>No rent records for {filterMonth} {filterYear}.</p></div> :
        <div className="table-wrap">
          <table>
            <thead><tr><th>Property</th><th>Tenant</th><th>Month</th><th>Amount</th><th>Paid Date</th><th>Status</th><th>Notes</th></tr></thead>
            <tbody>
              {filtered.map(r => {
                const prop = data.properties.find(p => p.ID === r['Property ID']);
                const tenant = data.tenants.find(t => t.ID === r['Tenant ID']);
                return (
                  <tr key={r.ID}>
                    <td className="name">{prop ? prop.Name : r['Property ID']}</td>
                    <td>{tenant ? tenant.Name : '—'}</td>
                    <td>{r.Month} {r.Year}</td>
                    <td className="mono">₹{Number(r.Amount||0).toLocaleString('en-IN')}</td>
                    <td style={{color:'var(--text-muted)'}}>{r['Paid Date']}</td>
                    <td><span className={`badge ${r.Status==='Paid'?'badge-green':r.Status==='Partial'?'badge-gold':'badge-red'}`}>{r.Status}</span></td>
                    <td style={{color:'var(--text-muted)'}}>{r.Notes}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

                    <td style={{color:'var(--text-muted)'}}>{m.Vendor}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

// Utilities Page
function Utilities({ data, onRefresh }) {
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({});

  const startEdit = (u) => { setEditing(u['Property ID']); setForm({...u}); };

  const handleSave = async () => {
    setSaving(true);
    try {
      if (editing === '__new__') {
        await appendRow('Utilities', [form['Property ID'] || '', form['Electricity Number'] || '', form['Property Tax Number'] || '', form['Water Bill Number'] || '', form.Notes || '']);
      } else {
        const u = data.utilities.find(x => x['Property ID'] === editing);
        await updateRow('Utilities', u._row, [form['Property ID'], form['Electricity Number']||'', form['Property Tax Number']||'', form['Water Bill Number']||'', form.Notes||''], 5);
      }
      setEditing(null);
      onRefresh();
    } catch (e) { alert('Error: ' + e.message); }
    setSaving(false);
  };

  return (
    <div>
      <div className="section-row">
        <h3>Utility Numbers</h3>
      </div>
      <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>Electricity, property tax and water bill reference numbers for each property.</div>

      <div className="gap-12">
        {data.properties.map(p => {
          const u = data.utilities.find(x => x['Property ID'] === p.ID) || {};
          const isEditing = editing === p.ID;
          return (
            <div className="card" key={p.ID}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom: isEditing ? 16 : 0}}>
                <div>
                  <div style={{fontWeight:500,marginBottom:4}}>{p.Name}</div>
                  {!isEditing && (
                    <div style={{display:'flex',gap:20,flexWrap:'wrap',marginTop:8}}>
                      <div><span style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>Electricity</span><div className="mono" style={{fontSize:13,color:'var(--text-primary)',marginTop:2}}>{u['Electricity Number'] || <span style={{color:'var(--text-muted)'}}>—</span>}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>Property Tax</span><div className="mono" style={{fontSize:13,color:'var(--text-primary)',marginTop:2}}>{u['Property Tax Number'] || <span style={{color:'var(--text-muted)'}}>—</span>}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>Water Bill</span><div className="mono" style={{fontSize:13,color:'var(--text-primary)',marginTop:2}}>{u['Water Bill Number'] || <span style={{color:'var(--text-muted)'}}>—</span>}</div></div>
                    </div>
                  )}
                </div>
                {!isEditing && <button className="btn btn-secondary btn-sm" onClick={() => startEdit(u['Property ID'] ? u : {... u, 'Property ID': p.ID})}>Edit</button>}
              </div>
              {isEditing && (
                <>
                  <div className="form-grid">
                    <div className="form-group"><label>Electricity Number</label><input value={form['Electricity Number']||''} onChange={e => setForm({...form, 'Electricity Number': e.target.value})}/></div>
                    <div className="form-group"><label>Property Tax Number</label><input value={form['Property Tax Number']||''} onChange={e => setForm({...form, 'Property Tax Number': e.target.value})}/></div>
                    <div className="form-group"><label>Water Bill Number</label><input value={form['Water Bill Number']||''} onChange={e => setForm({...form, 'Water Bill Number': e.target.value})}/></div>
                    <div className="form-group"><label>Notes</label><input value={form.Notes||''} onChange={e => setForm({...form, Notes: e.target.value})}/></div>
                  </div>
                  <div className="btn-row">
                    <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving ? <><span className="spinner"/>&nbsp;Saving...</> : 'Save'}</button>
                    <button className="btn btn-secondary" onClick={() => setEditing(null)}>Cancel</button>
                  </div>
                </>
              )}
            </div>
          );
        })}
        {data.properties.length === 0 && <div className="card"><div className="empty"><p>Add properties first to manage their utility numbers.</p></div></div>}
      </div>
    </div>
  );
}

// NLP Query Page
function NLPQuery({ data }) {
  const [messages, setMessages] = useState([
    { role: 'ai', text: "Hi! Ask me anything about your properties. For example:\n• How much rent was collected in May?\n• Which properties haven't paid June rent?\n• What's the phone number of the tenant at [property name]?\n• Total maintenance spent this year?" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef();
  const suggestions = [
    'How much rent collected this month?',
    'Which properties have not paid this month?',
    'Total maintenance spent this year?',
    'List all active tenants with their phone numbers',
    'What is the advance amount for each tenant?',
    'Show rent collection summary for last 3 months',
  ];

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  const ask = async (q) => {
    if (!q.trim() || loading) return;
    setMessages(m => [...m, { role: 'user', text: q }]);
    setInput('');
    setLoading(true);
    try {
      const answer = await askClaude(q, data);
      setMessages(m => [...m, { role: 'ai', text: answer }]);
    } catch (e) {
      setMessages(m => [...m, { role: 'ai', text: 'Error: ' + e.message }]);
    }
    setLoading(false);
  };

  return (
    <div>
      <div className="section-row">
        <h3>Ask a Question</h3>
        <span style={{fontSize:12,color:'var(--text-muted)'}}>Powered by Gemini AI (free)</span>
      </div>
      <div className="nlp-panel">
        <div className="nlp-messages">
          {messages.map((m, i) => (
            <div className="msg" key={i}>
              <div className={`msg-avatar ${m.role}`}>{m.role === 'user' ? 'You' : 'AI'}</div>
              <div className={`msg-bubble ${m.role}`} style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
            </div>
          ))}
          {loading && (
            <div className="msg">
              <div className="msg-avatar ai">AI</div>
              <div className="msg-bubble" style={{color:'var(--text-muted)'}}>Thinking...</div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        <div className="nlp-suggestions">
          {suggestions.map(s => <button key={s} className="nlp-chip" onClick={() => ask(s)}>{s}</button>)}
        </div>
        <div className="nlp-input-row">
          <textarea className="nlp-input" placeholder="Ask anything about your properties..." value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(input); }}}
          />
          <button className="btn btn-primary" onClick={() => ask(input)} disabled={loading || !input.trim()}>
            <Icon name="send" size={14}/>
          </button>
        </div>
      </div>
    </div>
  );
}

// Setup Page
function Setup() {
  const [cfg, setCfg] = useState(getConfig());
  const [saved, setSaved] = useState(false);

  const update = (key, val) => {
    const next = { ...cfg, [key]: val };
    setCfg(next);
    saveConfig(next);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div>
      <div className="section-row">
        <h3>Setup</h3>
        {saved && <span style={{fontSize:12,color:'var(--green)',display:'flex',alignItems:'center',gap:4}}><Icon name="check" size={12}/>Saved</span>}
      </div>

      <div className="setup-step">
        <div className={`setup-num ${cfg.spreadsheetId ? 'done' : ''}`}>{cfg.spreadsheetId ? <Icon name="check" size={14}/> : '1'}</div>
        <div className="setup-text">
          <h3>Create your Google Sheet</h3>
          <p>Go to <a href="https://sheets.new" target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>sheets.new</a> and create a new spreadsheet. Create 5 tabs named exactly: <code>Properties</code>, <code>Tenants</code>, <code>Rent</code>, <code>Maintenance</code>, <code>Utilities</code>. Then copy the Sheet ID from the URL:</p>
          <div className="input-block">https://docs.google.com/spreadsheets/d/<span style={{color:'var(--accent)'}}>YOUR_SHEET_ID</span>/edit</div>
          <div style={{marginTop:10}}>
            <div className="form-group">
              <label>Paste your Sheet ID here</label>
              <input placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" value={cfg.spreadsheetId || ''} onChange={e => update('spreadsheetId', e.target.value)}/>
            </div>
          </div>
        </div>
      </div>

      <div className="setup-step">
        <div className={`setup-num ${cfg.clientId ? 'done' : ''}`}>{cfg.clientId ? <Icon name="check" size={14}/> : '2'}</div>
        <div className="setup-text">
          <h3>Get Google OAuth Client ID</h3>
          <p>1. Go to <a href="https://console.cloud.google.com" target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>console.cloud.google.com</a> → Create a project<br/>
          2. Enable the <strong>Google Sheets API</strong> (APIs & Services → Library)<br/>
          3. Go to APIs & Services → Credentials → Create Credentials → OAuth 2.0 Client ID<br/>
          4. Application type: <code>Web application</code><br/>
          5. Add Authorized JavaScript origins: <code>{window.location.origin}</code><br/>
          6. Copy the Client ID</p>
          <div style={{marginTop:10}}>
            <div className="form-group">
              <label>Paste your OAuth Client ID</label>
              <input placeholder="123456789-abc.apps.googleusercontent.com" value={cfg.clientId || ''} onChange={e => update('clientId', e.target.value)}/>
            </div>
          </div>
        </div>
      </div>

      <div className="setup-step">
        <div className={`setup-num ${cfg.geminiKey ? 'done' : ''}`}>{cfg.geminiKey ? <Icon name="check" size={14}/> : '3'}</div>
        <div className="setup-text">
          <h3>Get Gemini API Key (for AI queries — free)</h3>
          <p>1. Go to <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>aistudio.google.com/apikey</a><br/>
          2. Click <strong>Create API Key</strong> → select your Google project<br/>
          3. Copy the key — it starts with <code>AIza...</code><br/>
          Free tier: 1,500 requests/day — more than enough for personal use.</p>
          <div style={{marginTop:10}}>
            <div className="form-group">
              <label>Paste your Gemini API Key</label>
              <input type="password" placeholder="AIzaSy..." value={cfg.geminiKey || ''} onChange={e => update('geminiKey', e.target.value)}/>
            </div>
          </div>
        </div>
      </div>

      <div className="setup-step">
        <div className={`setup-num ${cfg.accessToken ? 'done' : ''}`}>{cfg.accessToken ? <Icon name="check" size={14}/> : '4'}</div>
        <div className="setup-text">
          <h3>Sign in with Google</h3>
          <p>Click below to authorize access to your Google Sheet. You'll be redirected to Google and back automatically.</p>
          <div className="config-status">
            <div className={`dot ${cfg.accessToken ? 'dot-green' : 'dot-red'}`}/>
            <span style={{fontSize:12,color:cfg.accessToken?'var(--green)':'var(--red)'}}>{cfg.accessToken ? 'Signed in — Google Sheets access active' : 'Not signed in'}</span>
          </div>
          {cfg.clientId && (
            <button className="btn btn-primary" style={{marginTop:10}} onClick={signInWithGoogle}>
              Sign in with Google →
            </button>
          )}
          {!cfg.clientId && <p style={{fontSize:12,color:'var(--text-muted)',marginTop:8}}>Complete Step 2 first.</p>}
        </div>
      </div>

      <div className="setup-step">
        <div className="setup-num">5</div>
        <div className="setup-text">
          <h3>Host it for free on GitHub Pages</h3>
          <p>1. Create a GitHub account if needed, then create a new public repository<br/>
          2. Upload this <code>index.html</code> file to the repo<br/>
          3. Go to repo Settings → Pages → Source: <code>main</code> branch<br/>
          4. Your app will be live at <code>https://yourusername.github.io/reponame/</code><br/>
          5. Bookmark it on your phone — add to home screen for app-like access</p>
        </div>
      </div>

      <div style={{marginTop:16,padding:'14px 16px',background:'rgba(16,185,129,.06)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,fontSize:12,color:'var(--text-secondary)',lineHeight:1.7}}>
        <strong style={{color:'var(--green)'}}>Your data is safe:</strong> Everything is stored in your own Google Sheet which you own. This app only reads and writes to your sheet with your permission. Nothing is stored on any server.
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('dashboard');
  const [data, setData] = useState({ properties: [], tenants: [], rent: [], maintenance: [], utilities: [] });
  const [loading, setLoading] = useState(false);
  const [authed, setAuthed] = useState(false);

  useEffect(() => {
    parseTokenFromHash();
    const cfg = getConfig();
    setAuthed(!!(cfg.accessToken && cfg.spreadsheetId));
  }, []);

  const loadData = useCallback(async () => {
    const cfg = getConfig();
    if (!cfg.accessToken || !cfg.spreadsheetId) return;
    setLoading(true);
    try {
      await initSheets();
      const [properties, tenants, rent, maintenance, utilities] = await Promise.all([
        readSheet('Properties'), readSheet('Tenants'), readSheet('Rent'), readSheet('Maintenance'), readSheet('Utilities'),
      ]);
      setData({ properties, tenants, rent, maintenance, utilities });
      setAuthed(true);
    } catch (e) {
      if (e.message.includes('Session expired') || e.message.includes('Not authenticated')) setAuthed(false);
      console.error(e);
    }
    setLoading(false);
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  const nav = [
    { id: 'dashboard', label: 'Dashboard', icon: 'dashboard', section: 'Overview' },
    { id: 'properties', label: 'Properties', icon: 'home', section: 'Manage' },
    { id: 'tenants', label: 'Tenants', icon: 'users', section: 'Manage' },
    { id: 'rent', label: 'Rent', icon: 'currency', section: 'Manage' },
    { id: 'maintenance', label: 'Maintenance', icon: 'tool', section: 'Manage' },
    { id: 'utilities', label: 'Utilities', icon: 'zap', section: 'Manage' },
    { id: 'nlp', label: 'Ask AI', icon: 'chat', section: 'Tools' },
    { id: 'setup', label: 'Setup', icon: 'settings', section: 'Config' },
  ];

  const sections = [...new Set(nav.map(n => n.section))];
  const titles = { dashboard: ['Dashboard', 'Overview of all your properties'], properties: ['Properties', 'Add and view your properties'], tenants: ['Tenants', 'Manage tenant details'], rent: ['Rent', 'Track monthly rent payments'], maintenance: ['Maintenance', 'Log maintenance expenses'], utilities: ['Utilities', 'Electricity, tax & water numbers'], nlp: ['Ask AI', 'Natural language queries about your data'], setup: ['Setup', 'Configure Google Sheets and API keys'] };
  const [title, subtitle] = titles[page] || ['', ''];

  const renderPage = () => {
    if (!authed && page !== 'setup') {
      return (
        <div className="card" style={{maxWidth:480,margin:'40px auto',textAlign:'center',padding:'32px'}}>
          <div style={{fontSize:32,marginBottom:16}}>🏠</div>
          <h2 style={{marginBottom:8,fontSize:16}}>Welcome to Property Manager</h2>
          <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:20,lineHeight:1.6}}>Connect your Google Sheet to get started. All your data will be stored securely in your own Google Sheet.</p>
          <button className="btn btn-primary" onClick={() => setPage('setup')}>Start Setup →</button>
        </div>
      );
    }
    switch (page) {
      case 'dashboard': return <Dashboard data={data} loading={loading}/>;
      case 'properties': return <Properties data={data} onRefresh={loadData}/>;
      case 'tenants': return <Tenants data={data} onRefresh={loadData}/>;
      case 'rent': return <Rent data={data} onRefresh={loadData}/>;
      case 'maintenance': return <Maintenance data={data} onRefresh={loadData}/>;
      case 'utilities': return <Utilities data={data} onRefresh={loadData}/>;
      case 'nlp': return <NLPQuery data={data}/>;
      case 'setup': return <Setup/>;
      default: return null;
    }
  };

  return (
    <>
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="white" strokeWidth="1.5"/></svg></div>
          <h1>Property Manager</h1>
          <p>Your portfolio</p>
        </div>
        <nav className="sidebar-nav">
          {sections.map(section => (
            <div className="nav-section" key={section}>
              <div className="nav-section-label">{section}</div>
              {nav.filter(n => n.section === section).map(n => (
                <button key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
                  <Icon name={n.icon} size={16}/>
                  <span>{n.label}</span>
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          {!authed && <div className="setup-badge" onClick={() => setPage('setup')}>⚙ Complete setup</div>}
          {authed && loading && <div style={{fontSize:12,color:'var(--text-muted)',textAlign:'center'}}>Syncing...</div>}
          {authed && !loading && <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',cursor:'pointer'}} onClick={loadData}>● Live — click to refresh</div>}
        </div>
      </aside>
      <main className="main">
        <div className="topbar">
          <div>
            <h2>{title}</h2>
            <p>{subtitle}</p>
          </div>
          {authed && page !== 'setup' && (
            <button className="btn btn-secondary btn-sm" onClick={loadData} disabled={loading}>
              {loading ? <span className="spinner"/> : '↻'} Refresh
            </button>
          )}
        </div>
        <div className="content">{renderPage()}</div>
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
