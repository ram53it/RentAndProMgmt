<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jewel Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #14110a;
      --navy-mid: #1c1810;
      --navy-light: #2a2417;
      --navy-border: #3d3420;
      --accent: #d4a017;
      --accent-hover: #b8890f;
      --accent-light: rgba(212,160,23,0.12);
      --gold: #f59e0b;
      --silver: #9ca3af;
      --green: #10b981;
      --green-light: rgba(16,185,129,0.12);
      --red: #ef4444;
      --red-light: rgba(239,68,68,0.10);
      --text-primary: #f5f1e8;
      --text-secondary: #b3a98f;
      --text-muted: #7d7460;
      --surface: #1c1810;
      --surface-2: #2a2417;
      --border: #3d3420;
      --radius: 8px;
      --radius-lg: 12px;
      --mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--text-primary); min-height: 100vh; display: flex; }
    #root { display: flex; width: 100%; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 220px; min-height: 100vh; background: var(--navy-mid); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .logo-mark { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 17px; }
    .sidebar-logo h1 { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .sidebar-logo p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .nav-section { margin-bottom: 20px; }
    .nav-section-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; padding: 0 8px; margin-bottom: 4px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: all .15s; font-family: inherit; }
    .nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
    .setup-badge { font-size: 11px; background: rgba(245,158,11,.12); color: var(--gold); border: 1px solid rgba(245,158,11,.25); border-radius: 6px; padding: 6px 10px; cursor: pointer; text-align: center; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--navy-mid); }
    .topbar h2 { font-size: 16px; font-weight: 600; }
    .topbar p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .content { flex: 1; padding: 24px; overflow-y: auto; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
    .card + .card { margin-top: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .stat-value { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--text-primary); }
    .stat-value.green { color: var(--green); }
    .stat-value.gold { color: var(--gold); }
    .stat-value.silver { color: var(--silver); }
    .stat-value.red { color: var(--red); }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    td { padding: 12px; border-bottom: 1px solid rgba(61,52,32,.5); color: var(--text-secondary); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); color: var(--text-primary); }
    .mono { font-family: var(--mono); font-size: 12px; }
    td.name { color: var(--text-primary); font-weight: 500; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
    .badge-green { background: var(--green-light); color: var(--green); }
    .badge-red { background: var(--red-light); color: var(--red); }
    .badge-gold { background: rgba(245,158,11,.12); color: var(--gold); }
    .badge-silver { background: rgba(156,163,175,.12); color: var(--silver); }
    .badge-blue { background: var(--accent-light); color: var(--accent); }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 9px 12px; font-size: 13px; color: var(--text-primary); font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-group select option { background: var(--navy); }

    /* Item rows (transaction builder) */
    .item-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)) 36px; gap: 8px; align-items: end; padding: 10px; background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
    .item-row .form-group input, .item-row .form-group select { padding: 7px 9px; font-size: 12px; }
    .item-row .form-group label { font-size: 10px; }
    .row-del { background: var(--red-light); color: var(--red); border: none; border-radius: 6px; height: 33px; cursor: pointer; font-size: 14px; }
    .settle-box { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-top: 12px; }
    .settle-line { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; color: var(--text-secondary); }
    .settle-line.total { border-top: 1px solid var(--border); margin-top: 6px; padding-top: 10px; font-weight: 600; color: var(--text-primary); font-size: 14px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; font-family: inherit; }
    .btn-primary { background: var(--accent); color: #14110a; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .6; cursor: default; }
    .btn-secondary { background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text-primary); border-color: var(--accent); }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    /* NLP Panel */
    .nlp-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; height: 480px; }
    .nlp-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
    .msg-avatar.user { background: var(--accent-light); color: var(--accent); }
    .msg-avatar.ai { background: rgba(16,185,129,.15); color: var(--green); }
    .msg-bubble { background: var(--surface-2); border-radius: 8px; padding: 10px 14px; font-size: 13px; line-height: 1.6; color: var(--text-primary); max-width: 600px; }
    .msg-bubble.user { background: var(--accent-light); border: 1px solid rgba(212,160,23,.2); }
    .nlp-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .nlp-input { flex: 1; background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--text-primary); font-family: inherit; resize: none; height: 42px; }
    .nlp-input:focus { outline: none; border-color: var(--accent); }
    .nlp-suggestions { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .nlp-chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; background: none; font-family: inherit; transition: all .15s; }
    .nlp-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Setup page */
    .setup-step { display: flex; gap: 14px; padding: 16px; border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 12px; align-items: flex-start; }
    .setup-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .setup-num.done { background: var(--green-light); color: var(--green); }
    .setup-text h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .setup-text p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .setup-text code { font-family: var(--mono); font-size: 11px; background: rgba(0,0,0,.3); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
    .config-status { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-top: 8px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-green { background: var(--green); }
    .dot-red { background: var(--red); }

    /* Loading */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.2); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty p { font-size: 13px; margin-top: 6px; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; background: var(--navy); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; width: fit-content; flex-wrap: wrap; }
    .tab { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all .15s; border: none; background: none; font-family: inherit; }
    .tab.active { background: var(--surface); color: var(--text-primary); }

    /* Utility */
    .section-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .section-row h3 { font-size: 15px; font-weight: 600; }
    .gap-12 { display: flex; flex-direction: column; gap: 12px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } .sidebar { width: 56px; } .sidebar .sidebar-logo h1, .sidebar .nav-item span, .nav-section-label, .sidebar-logo p, .sidebar-footer { display: none; } .nav-item { justify-content: center; padding: 10px; } }

    /* PIN screen */
    .pin-screen { position: fixed; inset: 0; background: var(--navy); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .pin-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px 32px; width: 100%; max-width: 380px; text-align: center; }
    .pin-logo { width: 48px; height: 48px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 24px; }
    .pin-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .pin-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }
    .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); transition: all .15s; }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
    .pin-dot.error { background: var(--red); border-color: var(--red); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .pin-key { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-size: 18px; font-weight: 500; cursor: pointer; color: var(--text-primary); transition: all .15s; font-family: var(--mono); }
    .pin-key:hover { background: var(--navy-light); border-color: var(--accent); }
    .pin-key:active { transform: scale(.95); }
    .pin-key.del { font-size: 14px; color: var(--text-muted); }
    .pin-error { font-size: 12px; color: var(--red); margin-top: 8px; min-height: 18px; }
    .pin-setup-form { text-align: left; }
    .pin-setup-form .form-group { margin-bottom: 12px; }
    .pin-toggle { font-size: 12px; color: var(--accent); cursor: pointer; margin-top: 12px; display: inline-block; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── CONFIG — PIN-encrypted localStorage ──────────────────────────────────────
// Keys are AES-GCM encrypted with your PIN before being stored.
// Nothing sensitive is ever in the source code.
const STORE_KEY = 'jm_enc_config';
const TOKEN_KEY = 'jm_access_token';

async function deriveKey(pin) {
  const enc = new TextEncoder();
  const raw = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('jm-salt-v1'), iterations: 100000, hash: 'SHA-256' },
    raw, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

async function encryptConfig(pin, data) {
  const key = await deriveKey(pin);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const buf = new Uint8Array(iv.byteLength + cipher.byteLength);
  buf.set(iv, 0); buf.set(new Uint8Array(cipher), iv.byteLength);
  return btoa(String.fromCharCode(...buf));
}

async function decryptConfig(pin, b64) {
  try {
    const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const iv = buf.slice(0, 12), data = buf.slice(12);
    const key = await deriveKey(pin);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    return JSON.parse(new TextDecoder().decode(plain));
  } catch { return null; }
}

function hasEncryptedConfig() { return !!localStorage.getItem(STORE_KEY); }

async function loadConfig(pin) {
  const b64 = localStorage.getItem(STORE_KEY);
  if (!b64) return null;
  return decryptConfig(pin, b64);
}

async function persistConfig(pin, cfg) {
  const toStore = { spreadsheetId: cfg.spreadsheetId, clientId: cfg.clientId, geminiKey: cfg.geminiKey };
  const enc = await encryptConfig(pin, toStore);
  localStorage.setItem(STORE_KEY, enc);
}

let _runtimeConfig = null;
const getConfig = () => ({ ...(_runtimeConfig || {}), accessToken: localStorage.getItem(TOKEN_KEY) || null });
const saveConfig = (cfg) => {
  if (cfg.accessToken !== undefined) {
    if (cfg.accessToken) localStorage.setItem(TOKEN_KEY, cfg.accessToken);
    else localStorage.removeItem(TOKEN_KEY);
  }
};
const setRuntimeConfig = (cfg) => { _runtimeConfig = cfg; };

// ── GOOGLE SHEETS API ─────────────────────────────────────────────────────────
const HEADERS = {
  Stock:        ['ID','Box Name','Metal','Description','Location','Pieces','Weight Grams','Status','Notes','Created'],
  Transactions: ['ID','Date','Customer','Phone','Sale Value','Old Value','Cash In','UPI In','Cash Out','UPI Out','Balance Due','Status','Notes'],
  TxnItems:     ['ID','Txn ID','Source','Box ID','Description','Metal','Pieces','Weight Grams','Rate','Amount','Direction'],
  Lending:      ['ID','Date','Person','Phone','Type','Mode','Weight Grams','Amount','Interest %','Due Date','Status','Notes'],
  Payments:     ['ID','Date','Ref Type','Ref ID','Person','Mode','Amount','Weight Grams','Notes'],
  Ledger:       ['ID','Date','Direction','Mode','Amount','Category','Ref ID','Notes'],
  Refills:      ['ID','Date','Metal','Weight Grams','Cost','Paid Mode','Notes'],
  Movements:    ['ID','Date','From','To','Metal','Description','Pieces','Weight Grams','Notes'],
};

async function sheetsRequest(method, path, body = null) {
  const cfg = getConfig();
  if (!cfg.accessToken) throw new Error('Not authenticated');
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.spreadsheetId}${path}`;
  const res = await fetch(url, {
    method,
    headers: { Authorization: `Bearer ${cfg.accessToken}`, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401) { saveConfig({ ...cfg, accessToken: null }); throw new Error('Session expired — please sign in again'); }
    throw new Error(err.error?.message || 'Sheets API error');
  }
  return res.json();
}

async function readSheet(sheetName) {
  const data = await sheetsRequest('GET', `/values/${sheetName}`);
  const rows = data.values || [];
  if (rows.length <= 1) return [];
  const headers = rows[0];
  return rows.slice(1).filter(row => row && row.some(c => c !== '')).map((row, i) => {
    const obj = { _row: i + 2 };
    headers.forEach((h, j) => { obj[h] = (row[j] !== undefined ? row[j] : ''); });
    return obj;
  });
}

async function appendRow(sheetName, values) {
  await sheetsRequest('POST', `/values/${sheetName}!A1:append?valueInputOption=USER_ENTERED`, { values: [values] });
}

async function updateRow(sheetName, rowNum, values) {
  const col = String.fromCharCode(64 + values.length);
  await sheetsRequest('PUT', `/values/${sheetName}!A${rowNum}:${col}${rowNum}?valueInputOption=USER_ENTERED`, { values: [values] });
}

// Build the values array for a row object in header order (for updates)
function rowValues(sheetName, obj) {
  return HEADERS[sheetName].map(h => obj[h] !== undefined ? obj[h] : '');
}

// Create missing sheet tabs, then write headers where row 1 is empty
async function initSheets() {
  try {
    const meta = await sheetsRequest('GET', '?fields=sheets.properties.title');
    const existing = (meta.sheets || []).map(s => s.properties.title);
    const missing = Object.keys(HEADERS).filter(t => !existing.includes(t));
    if (missing.length) {
      await sheetsRequest('POST', ':batchUpdate', { requests: missing.map(t => ({ addSheet: { properties: { title: t } } })) });
    }
  } catch(e) { console.warn('initSheets tabs:', e.message); }
  for (const [sheet, h] of Object.entries(HEADERS)) {
    try {
      const existing = await sheetsRequest('GET', `/values/${sheet}!A1:A1`);
      const hasHeader = existing.values && existing.values.length > 0 && existing.values[0][0];
      if (!hasHeader) {
        const endCol = String.fromCharCode(64 + h.length);
        await sheetsRequest('PUT', `/values/${sheet}!A1:${endCol}1?valueInputOption=USER_ENTERED`, { values: [h] });
      }
    } catch(e) { console.warn('initSheets header for', sheet, e.message); }
  }
}

// ── GOOGLE AUTH ───────────────────────────────────────────────────────────────
function signInWithGoogle() {
  const cfg = getConfig();
  const params = new URLSearchParams({
    client_id: cfg.clientId,
    redirect_uri: window.location.origin + window.location.pathname,
    response_type: 'token',
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    prompt: 'consent',
  });
  window.location.href = `https://accounts.google.com/o/oauth2/auth?${params}`;
}

function parseTokenFromHash() {
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const token = hash.get('access_token');
  if (token) {
    localStorage.setItem(TOKEN_KEY, token);
    window.history.replaceState({}, '', window.location.pathname);
    return token;
  }
  return null;
}

// ── SHARED HELPERS ────────────────────────────────────────────────────────────
const fmtINR = (v) => '₹' + Number(v||0).toLocaleString('en-IN');
const fmtG   = (v) => Number(v||0).toLocaleString('en-IN', { maximumFractionDigits: 3 }) + ' g';
const todayStr = () => new Date().toISOString().slice(0,10);
const uid = (p) => p + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const num = (v) => { const n = Number(v); return isNaN(n) ? 0 : n; };

// Append a ledger entry — every cash/account movement goes through here
async function addLedger(date, direction, mode, amount, category, refId, notes) {
  if (num(amount) <= 0) return;
  await appendRow('Ledger', [uid('L'), date, direction, mode, num(amount), category, refId||'', notes||'']);
}

// ── DERIVED TOTALS — computed fresh from sheets every load ───────────────────
function computeDerived(data) {
  let cashIn=0, cashOut=0, acctIn=0, acctOut=0;
  data.ledger.forEach(l => {
    const amt = num(l.Amount);
    const isCash = l.Mode === 'Cash';
    if (l.Direction === 'In') { isCash ? cashIn += amt : acctIn += amt; }
    else { isCash ? cashOut += amt : acctOut += amt; }
  });

  let goldBoxG=0, silverBoxG=0, goldBoxes=0, silverBoxes=0;
  data.stock.forEach(b => {
    const w = num(b['Weight Grams']);
    if (b.Metal === 'Silver') { silverBoxG += w; if (w>0) silverBoxes++; }
    else { goldBoxG += w; if (w>0) goldBoxes++; }
  });

  // Old-metal pool: refills + old jewel received − pool metal given out − metal lent + metal repaid ± manual moves
  let goldPool=0, silverPool=0;
  const poolAdd = (metal, g) => { metal === 'Silver' ? silverPool += g : goldPool += g; };
  data.refills.forEach(r => poolAdd(r.Metal, num(r['Weight Grams'])));
  data.txnItems.forEach(it => {
    if (it.Source !== 'Pool') return;
    poolAdd(it.Metal, (it.Direction === 'In' ? 1 : -1) * num(it['Weight Grams']));
  });
  data.lending.forEach(l => {
    if (l.Type === 'Gold' || l.Type === 'Silver') poolAdd(l.Type, -num(l['Weight Grams']));
  });
  data.payments.forEach(p => {
    if (p.Mode === 'Gold' || p.Mode === 'Silver') poolAdd(p.Mode, num(p['Weight Grams']));
  });
  data.movements.forEach(m => {
    const w = num(m['Weight Grams']);
    if (m.From === 'Old Gold Pool') goldPool -= w;
    if (m.From === 'Old Silver Pool') silverPool -= w;
    if (m.To === 'Old Gold Pool') goldPool += w;
    if (m.To === 'Old Silver Pool') silverPool += w;
  });

  // Outstanding balances
  const paidFor = (refType, refId) => data.payments
    .filter(p => p['Ref Type'] === refType && p['Ref ID'] === refId)
    .reduce((s,p) => s + num(p.Amount), 0);

  const txnOutstanding = data.transactions.map(t => ({ ...t, outstanding: num(t['Balance Due']) - paidFor('Transaction', t.ID) }));

  // Simple interest on principal, per month, from lending date until today (stops once Closed)
  const interestFor = (l) => {
    const rate = num(l['Interest %']);
    if (!rate || !l.Date) return 0;
    const days = Math.max(0, (Date.now() - new Date(l.Date).getTime()) / 86400000);
    return Math.round(num(l.Amount) * (rate/100) * (days/30));
  };
  const lendOutstanding = data.lending.map(l => {
    const closed = l.Status === 'Closed';
    const interest = closed ? 0 : interestFor(l);
    const paid = paidFor('Lending', l.ID);
    return { ...l, interest, paid, outstanding: closed ? 0 : num(l.Amount) + interest - paid };
  });

  const customerDue = txnOutstanding.filter(t => t.outstanding > 0).reduce((s,t) => s + t.outstanding, 0);
  const weOwe       = txnOutstanding.filter(t => t.outstanding < 0).reduce((s,t) => s - t.outstanding, 0);
  const lendingDue  = lendOutstanding.filter(l => l.outstanding > 0).reduce((s,l) => s + l.outstanding, 0);

  return {
    cashInHand: cashIn - cashOut,
    accountBal: acctIn - acctOut,
    goldBoxG, silverBoxG, goldBoxes, silverBoxes,
    goldPool, silverPool,
    txnOutstanding, lendOutstanding,
    customerDue, weOwe, lendingDue,
    paidFor,
  };
}

// ── SMART DATA FILTER — send only what the query needs ───────────────────────
function filterDataForQuery(question, data, derived) {
  const q = question.toLowerCase();

  const summary = {
    cashInHand: derived.cashInHand,
    accountBalance: derived.accountBal,
    goldInBoxesGrams: derived.goldBoxG,
    silverInBoxesGrams: derived.silverBoxG,
    oldGoldPoolGrams: derived.goldPool,
    oldSilverPoolGrams: derived.silverPool,
    customersOweUs: derived.customerDue,
    weOweCustomers: derived.weOwe,
    lendingOutstanding: derived.lendingDue,
  };

  const slim = (arr, fields) => arr.map(row => {
    const obj = {};
    fields.forEach(f => { if (row[f] !== undefined && row[f] !== '') obj[f] = row[f]; });
    return obj;
  });

  const needsStock   = q.match(/stock|box|pocket|container|weight|gram|gold|silver|ornament|item|jewel|move|moved|shift|location|place|locker/);
  const needsTxn     = q.match(/sale|sold|sell|buy|bought|purchase|customer|transaction|balance|due|exchange|old/);
  const needsLending = q.match(/lend|loan|borrow|gave|given|owe|return|help|installment|interest/);
  const needsLedger  = q.match(/cash|account|upi|ledger|money|spent|expense|hand|received|paid/);

  const result = { summary };
  if (needsStock || (!needsTxn && !needsLending && !needsLedger)) {
    result.stockBoxes = slim(data.stock, ['ID','Box Name','Metal','Description','Location','Pieces','Weight Grams','Status']);
    result.refills = slim(data.refills, ['Date','Metal','Weight Grams','Cost']);
    result.itemMovements = slim(data.movements.slice(-100), ['Date','From','To','Metal','Description','Pieces','Weight Grams','Notes']);
  }
  if (needsTxn) {
    result.transactions = derived.txnOutstanding.slice(-100).map(t => ({
      ID:t.ID, Date:t.Date, Customer:t.Customer, Phone:t.Phone, SaleValue:t['Sale Value'], OldValue:t['Old Value'],
      CashIn:t['Cash In'], UPIIn:t['UPI In'], CashOut:t['Cash Out'], UPIOut:t['UPI Out'], Outstanding:t.outstanding, Status:t.Status,
    }));
    result.transactionItems = slim(data.txnItems.slice(-200), ['Txn ID','Source','Description','Metal','Pieces','Weight Grams','Rate','Amount','Direction']);
  }
  if (needsLending) {
    result.lending = derived.lendOutstanding.map(l => ({
      ID:l.ID, Date:l.Date, Person:l.Person, Phone:l.Phone, Type:l.Type, WeightGrams:l['Weight Grams'],
      Principal:l.Amount, InterestPctPerMonth:l['Interest %'], InterestAccrued:l.interest,
      DueDate:l['Due Date'], Outstanding:l.outstanding, Status:l.Status,
    }));
    result.repayments = slim(data.payments.filter(p=>p['Ref Type']==='Lending'), ['Date','Ref ID','Person','Mode','Amount','Weight Grams']);
  }
  if (needsLedger) {
    result.ledgerRecent = slim(data.ledger.slice(-150), ['Date','Direction','Mode','Amount','Category','Notes']);
  }
  return result;
}

// ── AI — auto-detects Claude (sk-ant-) or Gemini (AIza) key ──────────────────
async function askAI(question, data, derived) {
  const cfg = getConfig();
  const key = cfg.geminiKey || '';
  if (!key) return 'AI API key not set. Add it in Setup.';

  const filtered = filterDataForQuery(question, data, derived);
  const now = new Date();

  const context = `You are an assistant for a small family jewellery business in India. Answer concisely using only the data provided.
Amounts are in ₹ (INR), weights in grams. "Pool" means loose old gold/silver received from customers (not in boxes).
Stock is kept in boxes/pockets (each has a Location = where it is kept). Item movements between boxes/pool/places are logged in itemMovements.
Transactions can mix selling ornaments, receiving old jewel, and cash/UPI settlement.
Positive Outstanding on a transaction = customer still owes us; negative = we owe the customer.
Lending = gold or cash given to help someone, repaid in installments. Some lending carries simple interest (% per month on principal); InterestAccrued is computed till today and Outstanding = Principal + InterestAccrued − repaid.
Today: ${now.toLocaleDateString('en-IN')}.

DATA:
${JSON.stringify(filtered)}`;

  const isClaude = key.startsWith('sk-ant-');
  if (isClaude) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 1000, system: context, messages: [{ role: 'user', content: question }] }),
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'Claude API error'); }
    const d = await res.json();
    return d.content[0].text;
  } else {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: context }] },
        contents: [{ role: 'user', parts: [{ text: question }] }],
        generationConfig: { maxOutputTokens: 1000 }
      }),
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'Gemini API error'); }
    const d = await res.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text || 'No response from Gemini.';
  }
}

  return (
    <div>
      <div className="stats-row">
        <div className="stat-card"><div className="stat-label">💵 Cash in Hand</div><div className={`stat-value ${d.cashInHand>=0?'green':'red'}`}>{fmtINR(d.cashInHand)}</div><div className="stat-sub">From ledger</div></div>
        <div className="stat-card"><div className="stat-label">🏦 Account / UPI</div><div className={`stat-value ${d.accountBal>=0?'green':'red'}`}>{fmtINR(d.accountBal)}</div><div className="stat-sub">From ledger</div></div>

        <div className="stat-card"><div className="stat-label">🥈 Silver Stock</div><div className="stat-value silver">{fmtG(d.silverBoxG + d.silverPool)}</div><div className="stat-sub">{fmtG(d.silverBoxG)} in boxes + {fmtG(d.silverPool)} old/loose</div></div>
        <div className="stat-card"><div className="stat-label">⏳ Customers Owe</div><div className="stat-value" style={{color:d.customerDue>0?'var(--gold)':'var(--green)'}}>{fmtINR(d.customerDue)}</div><div className="stat-sub">{d.weOwe>0?`We owe ${fmtINR(d.weOwe)}`:'Balance due to us'}</div></div>
        <div className="stat-card"><div className="stat-label">🤝 Lending Out</div><div className="stat-value" style={{color:d.lendingDue>0?'var(--gold)':'var(--green)'}}>{fmtINR(d.lendingDue)}</div><div className="stat-sub">{openLends.length} open</div></div>
      </div>

        <div className="card">
          <div className="section-row" style={{marginBottom:12}}>
            <div className="card-title" style={{marginBottom:0}}>Recent Transactions</div>
            <button className="btn btn-primary btn-sm" onClick={()=>onNav('newtxn')}><Icon name="plus" size={12}/> New Transaction</button>

          <div className="table-wrap"><table>
            <thead><tr><th>Date</th><th>Customer</th><th>Sale</th><th>Old</th><th>Status</th></tr></thead>
            <tbody>{recentTxns.map(t => {
              const out = d.txnOutstanding.find(x=>x.ID===t.ID)?.outstanding || 0;
              return (<tr key={t.ID}>
                <td className="mono">{t.Date}</td>
                <td className="name">{t.Customer}</td>
                <td className="mono">{fmtINR(t['Sale Value'])}</td>
                <td className="mono">{fmtINR(t['Old Value'])}</td>
                <td><span className={`badge ${Math.abs(out)<.5?'badge-green':out>0?'badge-gold':'badge-red'}`}>{Math.abs(out)<.5?'Settled':out>0?`Due ${fmtINR(out)}`:`We owe ${fmtINR(-out)}`}</span></td>
              </tr>);
            })}</tbody>
          </table></div>}
        </div>

        <div>
          <div className="card">
            <div className="card-title">Pending Balances</div>
            {pendingTxns.length === 0 ? <div className="empty"><p>All transactions settled ✓</p></div> :
